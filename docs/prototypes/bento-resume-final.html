<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bento Resume</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ================================================================
   CSS VARIABLES
   ================================================================ */
:root {
  --bg: #f0ece8;
  --card: #fffffe;
  --card-alt: #f8f4f0;
  --coral: #e8734a;
  --coral-dark: #d4603b;
  --lavender: #8b7ec8;
  --lavender-dark: #7468b0;
  --text-1: #2a2a2a;
  --text-2: #5e5850;
  --text-3: #9e9690;
  --coral-soft: rgba(232, 115, 74, 0.08);
  --coral-mid: rgba(232, 115, 74, 0.18);
  --lav-soft: rgba(139, 126, 200, 0.08);
  --lav-mid: rgba(139, 126, 200, 0.18);
  --shadow-sm: 0 1px 4px rgba(0,0,0,0.03), 0 4px 16px rgba(0,0,0,0.03);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.04), 0 8px 32px rgba(0,0,0,0.05);
  --r: 16px;
  --r-sm: 10px;
  --gap: 10px;
  --pad: 22px;
  --pad-sm: 18px;
  --font: 'DM Sans', 'Noto Sans SC', sans-serif;
}

/* ================================================================
   RESET & BASE
   ================================================================ */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ================================================================
   PAGE (A4-friendly)
   ================================================================ */
.page {
  max-width: 794px;
  margin: 36px auto;
  padding: 0 20px;
}

/* ================================================================
   SECTION — each "row band" is its own mini-grid
   ================================================================ */
.section {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: var(--gap);
  margin-bottom: var(--gap);
}

/* ================================================================
   CARD BASE
   ================================================================ */
.card {
  background: var(--card);
  border-radius: var(--r);
  padding: var(--pad);
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
  transition: box-shadow 0.3s ease, transform 0.3s ease;
}

.card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

/* Span helpers */
.span-12 { grid-column: span 12; }
.span-8  { grid-column: span 8; }
.span-7  { grid-column: span 7; }
.span-6  { grid-column: span 6; }
.span-5  { grid-column: span 5; }
.span-4  { grid-column: span 4; }
.span-3  { grid-column: span 3; }

/* ================================================================
   TAG (section label)
   ================================================================ */
.tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-3);
  margin-bottom: 14px;
}

.tag::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--coral);
}

.tag--lav::before { background: var(--lavender); }

/* ================================================================
   HERO
   ================================================================ */
.card--hero {
  background: linear-gradient(140deg, var(--coral) 0%, var(--coral-dark) 100%);
  color: #fff;
  padding: 34px var(--pad) 30px;
}

.card--hero .tag { color: rgba(255,255,255,0.45); }
.card--hero .tag::before { background: rgba(255,255,255,0.5); }

.hero__name {
  font-size: 32px;
  font-weight: 700;
  line-height: 1.15;
  letter-spacing: -0.5px;
}

.hero__subtitle {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.72);
  margin-top: 6px;
}

.hero__badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  margin-top: 18px;
  padding: 5px 14px;
  background: rgba(255,255,255,0.16);
  border: 1px solid rgba(255,255,255,0.22);
  border-radius: 100px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: #fff;
}

.hero__badge-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #fff;
  animation: pulse 2.2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

/* Decorative circle on hero */
.card--hero::after {
  content: '';
  position: absolute;
  top: -30px;
  right: -30px;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.07);
  border-radius: 50%;
  pointer-events: none;
}

/* ================================================================
   CONTACT
   ================================================================ */
.contact-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 11px;
  font-size: 12px;
  color: var(--text-2);
  text-decoration: none;
  padding: 6px 8px;
  border-radius: 8px;
  transition: background 0.2s;
}

a.contact-item:hover { background: var(--lav-soft); }

.contact-icon {
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--lav-soft);
  color: var(--lavender);
  border-radius: 8px;
  font-size: 12px;
  flex-shrink: 0;
}

/* ================================================================
   BIO
   ================================================================ */
.card--bio { background: var(--card-alt); }

.bio-text {
  font-size: 13px;
  line-height: 1.85;
  color: var(--text-2);
}

.bio-text em {
  font-style: normal;
  font-weight: 600;
  color: var(--text-1);
}

/* ================================================================
   SKILLS
   ================================================================ */
.skills-wrap {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}

.skill-pill {
  padding: 6px 15px;
  background: var(--coral-soft);
  border: 1px solid var(--coral-mid);
  border-radius: 100px;
  font-size: 11.5px;
  font-weight: 500;
  color: var(--coral-dark);
  transition: transform 0.2s;
}

.skill-pill:hover { transform: translateY(-1px); }

/* ================================================================
   PROJECT
   ================================================================ */
.project__head {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 4px;
}

.project__name {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-1);
}

.project__link {
  font-size: 10px;
  font-weight: 600;
  color: var(--text-3);
  text-decoration: none;
  padding: 3px 10px;
  border: 1px solid var(--text-3);
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
  opacity: 0.6;
  transition: opacity 0.2s;
}

.project__link:hover { opacity: 1; }

.project__summary {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 12px;
  line-height: 1.6;
}

/* ================================================================
   BULLETS (shared)
   ================================================================ */
.bullets {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.bullets li {
  font-size: 12px;
  line-height: 1.65;
  color: var(--text-2);
  padding-left: 14px;
  position: relative;
}

.bullets li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 7px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--coral);
  opacity: 0.45;
}

.bullets--lav li::before { background: var(--lavender); }

/* ================================================================
   TECH CHIPS
   ================================================================ */
.tech-row {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 12px;
}

.tech-chip {
  padding: 2px 10px;
  background: var(--lav-soft);
  border-radius: 5px;
  font-size: 10px;
  font-weight: 600;
  color: var(--lavender-dark);
}

/* ================================================================
   WORK
   ================================================================ */
.work__company {
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 3px;
}

.work__meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11.5px;
  color: var(--text-3);
  margin-bottom: 10px;
}

.work__role { color: var(--text-2); font-weight: 500; }
.work__sep { opacity: 0.3; }

.work__summary {
  font-size: 12.5px;
  color: var(--text-2);
  margin-bottom: 10px;
  line-height: 1.7;
}

/* Compact work card (intern etc.) */
.card--compact {
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: linear-gradient(150deg, rgba(139,126,200,0.05) 0%, var(--card) 70%);
}

.compact__company { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
.compact__role { font-size: 12px; color: var(--text-2); }
.compact__time { font-size: 11px; color: var(--text-3); margin-top: 3px; }

/* ================================================================
   EDUCATION
   ================================================================ */
.edu__school {
  font-size: 16px;
  font-weight: 700;
  margin-bottom: 8px;
}

.edu-rows { display: flex; flex-direction: column; gap: 5px; }

.edu-row {
  display: flex;
  align-items: baseline;
  gap: 8px;
  font-size: 12px;
}

.edu-key {
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-3);
  width: 36px;
  flex-shrink: 0;
}

.edu-val { color: var(--text-2); }

/* ================================================================
   APPENDIX
   ================================================================ */
.appendix__title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 4px;
}

.appendix__desc {
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 12px;
  line-height: 1.65;
}

.appendix__img {
  width: 100%;
  border-radius: var(--r-sm);
  aspect-ratio: 16 / 9;
  object-fit: cover;
}

.appendix__placeholder {
  width: 100%;
  border-radius: var(--r-sm);
  aspect-ratio: 2.2 / 1;
  background: linear-gradient(135deg, var(--coral-soft), var(--lav-soft));
  border: 1.5px dashed var(--coral-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-3);
}

/* ================================================================
   FOOTER
   ================================================================ */
.footer {
  text-align: center;
  padding: 32px 0 48px;
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

/* ================================================================
   RESPONSIVE
   ================================================================ */
@media (max-width: 680px) {
  .section { grid-template-columns: repeat(4, 1fr); }
  .span-12, .span-8, .span-7, .span-6, .span-5, .span-4, .span-3 {
    grid-column: span 4;
  }
  .page { padding: 0 12px; margin: 16px auto; }
  .card { padding: var(--pad-sm); }
  .hero__name { font-size: 26px; }
}

/* ================================================================
   PRINT
   ================================================================ */
@media print {
  body { background: #fff; }
  .page { margin: 0; padding: 20px; max-width: 100%; }
  .card { box-shadow: none; border: 1px solid #e8e0d6; break-inside: avoid; }
  .card:hover { transform: none; box-shadow: none; }
  .card--hero { print-color-adjust: exact; -webkit-print-color-adjust: exact; }
  .footer { display: none; }
}
</style>
</head>
<body>

<script>
// ================================================================

const RESUME = {

    {

    {

      image: null   // 填入图片 URL 即可显示
    },
    {

// ================================================================
//  🔧 RENDER ENGINE
// ================================================================

// Layout patterns: alternate wide/narrow for visual rhythm
const SPAN_PATTERNS = {
  // For pairs: [first, second]
  pair: [7, 5],
  pairFlip: [5, 7],
  // For triples: [first, second, third]
  triple: [5, 4, 3],
  // For single full-width
  full: [12],
  // Work: detailed + compact
  workDetail: 8,
  workCompact: 4,
};

function html(tag, cls, content, attrs = '') {
  return `<${tag} class="${cls}" ${attrs}>${content}</${tag}>`;
}

function renderTag(text, variant = '') {
  return `<span class="tag ${variant}">${text}</span>`;
}

function renderBullets(items, variant = '') {
  return `<ul class="bullets ${variant}">${items.map(b => `<li>${b}</li>`).join('')}</ul>`;
}

function renderTech(items) {
  if (!items || !items.length) return '';
  return `<div class="tech-row">${items.map(t => `<span class="tech-chip">${t}</span>`).join('')}</div>`;
}

function render(data) {
  const root = document.getElementById('app');
  let out = '';

  // ---- ROW 1: Hero + Contact ----
  out += `<div class="section">`;
  // Hero
  out += `<div class="card card--hero span-8">
    ${renderTag('Resume')}
    <div class="hero__name">${data.header.name}</div>
    <div class="hero__subtitle">${data.header.title}</div>
    ${data.header.badge ? `<div class="hero__badge"><span class="hero__badge-dot"></span>${data.header.badge}</div>` : ''}
  </div>`;
  // Contact
  const h = data.header;
  out += `<div class="card span-4">
    ${renderTag('Contact', 'tag--lav')}
    <ul class="contact-list">
      <a class="contact-item" href="https://${h.github}" target="_blank"><span class="contact-icon">⌘</span>${h.github}</a>
      <a class="contact-item" href="https://${h.website}" target="_blank"><span class="contact-icon">◎</span>${h.website}</a>
      <span class="contact-item"><span class="contact-icon">☎</span>${h.phone}</span>
      <a class="contact-item" href="mailto:${h.email}"><span class="contact-icon">✉</span>${h.email}</a>
    </ul>
  </div>`;
  out += `</div>`;

  // ---- ROW 2: Bio + Skills ----
  out += `<div class="section">`;
  out += `<div class="card card--bio span-5">
    ${renderTag('About')}
    <p class="bio-text">${data.bio}</p>
  </div>`;
  out += `<div class="card span-7">
    ${renderTag('Skills')}
    <div class="skills-wrap">${data.skills.map(s => `<span class="skill-pill">${s}</span>`).join('')}</div>
  </div>`;
  out += `</div>`;

  // ---- ROW 3+: Projects (dynamic) ----
  // Process in pairs, alternating 7/5 and 5/7
  const projects = data.projects;
  for (let i = 0; i < projects.length; i += 2) {
    out += `<div class="section">`;
    const flip = (i / 2) % 2 === 1;
    const spans = flip ? SPAN_PATTERNS.pairFlip : SPAN_PATTERNS.pair;

    // First project
    const p1 = projects[i];
    out += `<div class="card span-${spans[0]}">
      ${renderTag('Project')}
      <div class="project__head">
        <span class="project__name">${p1.name}</span>
        ${p1.repo ? `<a class="project__link" href="https://${p1.repo}" target="_blank">↗ Repo</a>` : ''}
      </div>
      <p class="project__summary">${p1.summary}</p>
      ${renderBullets(p1.bullets)}
      ${renderTech(p1.tech)}
    </div>`;

    // Second project (if exists)
    if (projects[i + 1]) {
      const p2 = projects[i + 1];
      out += `<div class="card span-${spans[1]}">
        ${renderTag('Project')}
        <div class="project__head">
          <span class="project__name">${p2.name}</span>
          ${p2.repo ? `<a class="project__link" href="https://${p2.repo}" target="_blank">↗ Repo</a>` : ''}
        </div>
        <p class="project__summary">${p2.summary}</p>
        ${renderBullets(p2.bullets)}
        ${renderTech(p2.tech)}
      </div>`;
    } else {
      // Odd project: fill remaining space
      out += `<div class="span-${spans[1]}"></div>`;
    }
    out += `</div>`;
  }

  // ---- ROW: Work experiences (dynamic) ----
  // Group into rows: each detailed (has bullets) takes span-8, compact takes span-4
  // We try to pair a detailed + compact, or stack as needed
  const workQueue = [...data.work];
  while (workQueue.length > 0) {
    out += `<div class="section">`;
    const current = workQueue.shift();

    if (current.bullets && current.bullets.length > 0) {
      // Detailed card
      out += `<div class="card span-${SPAN_PATTERNS.workDetail}">
        ${renderTag('Experience')}
        <div class="work__company">${current.company}</div>
        <div class="work__meta">
          <span class="work__role">${current.role}</span>
          <span class="work__sep">·</span>
          <span>${current.time}</span>
        </div>
        ${current.summary ? `<p class="work__summary">${current.summary}</p>` : ''}
        ${renderBullets(current.bullets, 'bullets--lav')}
      </div>`;

      // Try to pair with a compact card
      const nextCompactIdx = workQueue.findIndex(w => !w.bullets || w.bullets.length === 0);
      if (nextCompactIdx !== -1) {
        const compact = workQueue.splice(nextCompactIdx, 1)[0];
        out += `<div class="card card--compact span-${SPAN_PATTERNS.workCompact}">
          ${renderTag('Internship', 'tag--lav')}
          <div class="compact__company">${compact.company}</div>
          <div class="compact__role">${compact.role}</div>
          <div class="compact__time">${compact.time}</div>
        </div>`;
      }
    } else {
      // Compact card solo → span-4, check if there's another compact to pair
      out += `<div class="card card--compact span-${SPAN_PATTERNS.workCompact}">
        ${renderTag('Experience', 'tag--lav')}
        <div class="compact__company">${current.company}</div>
        <div class="compact__role">${current.role}</div>
        <div class="compact__time">${current.time}</div>
      </div>`;

      // Fill next slots from queue
      let remaining = 12 - SPAN_PATTERNS.workCompact;
      while (workQueue.length > 0 && remaining >= SPAN_PATTERNS.workCompact) {
        const next = workQueue[0];
        if (!next.bullets || next.bullets.length === 0) {
          workQueue.shift();
          out += `<div class="card card--compact span-${SPAN_PATTERNS.workCompact}">
            ${renderTag('Experience', 'tag--lav')}
            <div class="compact__company">${next.company}</div>
            <div class="compact__role">${next.role}</div>
            <div class="compact__time">${next.time}</div>
          </div>`;
          remaining -= SPAN_PATTERNS.workCompact;
        } else {
          break;
        }
      }
    }
    out += `</div>`;
  }

  // ---- ROW: Education (dynamic) ----
  const eduList = data.education;
  // Calculate spans based on count
  out += `<div class="section">`;
  const eduSpans = eduList.length === 1 ? [5] :
                   eduList.length === 2 ? [5, 7] :
                   eduList.map((_, i) => i === 0 ? 4 : i === 1 ? 4 : 4);
  // For >3 edu items, just repeat
  eduList.forEach((edu, i) => {
    const span = eduSpans[i] || 4;
    out += `<div class="card span-${span}">
      ${renderTag('Education', i % 2 === 1 ? 'tag--lav' : '')}
      <div class="edu__school">${edu.school}</div>
      <div class="edu-rows">
        <div class="edu-row"><span class="edu-key">学位</span><span class="edu-val">${edu.degree}</span></div>
        <div class="edu-row"><span class="edu-key">专业</span><span class="edu-val">${edu.major}</span></div>
        <div class="edu-row"><span class="edu-key">时间</span><span class="edu-val">${edu.time}</span></div>
      </div>
    </div>`;
  });
  out += `</div>`;

  // ---- ROW(s): Appendix (dynamic) ----
  const appList = data.appendix;
  if (appList && appList.length > 0) {
    for (let i = 0; i < appList.length; i += 2) {
      out += `<div class="section">`;
      const spans = appList.length === 1 ? [12] :
                    (i / 2) % 2 === 0 ? [7, 5] : [5, 7];

      const a1 = appList[i];
      out += `<div class="card span-${spans[0]}">
        ${renderTag('Appendix', 'tag--lav')}
        <div class="appendix__title">${a1.title}</div>
        <p class="appendix__desc">${a1.desc}</p>
        ${a1.image
          ? `<img class="appendix__img" src="${a1.image}" alt="${a1.title}" />`
          : `<div class="appendix__placeholder">📷 替换 image 字段以显示图片</div>`}
      </div>`;

      if (appList[i + 1]) {
        const a2 = appList[i + 1];
        out += `<div class="card span-${spans[1]}">
          ${renderTag('Appendix', 'tag--lav')}
          <div class="appendix__title">${a2.title}</div>
          <p class="appendix__desc">${a2.desc}</p>
          ${a2.image
            ? `<img class="appendix__img" src="${a2.image}" alt="${a2.title}" />`
            : `<div class="appendix__placeholder">📷 替换 image 字段以显示图片</div>`}
        </div>`;
      }
      out += `</div>`;
    }
  }

  root.innerHTML = out;
}

document.addEventListener('DOMContentLoaded', () => render(RESUME));
</script>

<main class="page" id="app"></main>
<footer class="footer">Crafted with intention</footer>

</body>
</html>
